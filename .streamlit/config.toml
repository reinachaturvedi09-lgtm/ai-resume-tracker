[theme]
primaryColor = "#2E86C1"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = false
sidebarState = "expanded"

[logger]
level = "info"
messageFormat = "%(asctime)s - %(levelname)s - %(message)s"

[server]
headless = true
runOnSave = true
maximumUploadedFileSize = 10
